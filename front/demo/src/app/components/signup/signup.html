<div class="tg-container">
  <h2>Регистрация</h2>
  <p>Пожалуйста, подтвердите свои данные.</p>

  <form [formGroup]="regForm">
    <div class="form-group">
      <label for="name">Имя</label>
      <input id="name" type="text" formControlName="name" placeholder="Ваше имя">
    </div>

    <div class="form-group">
      <label for="phone">Телефон</label>
      <input id="phone" type="tel" formControlName="phone" placeholder="+1234567890">
    </div>

    <div>
      <span>One way: from api telegram</span>
      <button (click)="onSubmit(1)" [disabled]="regForm.invalid || isSubmitting()">
        {{ isSubmitting() ? 'Отправка...' : 'Зарегистрироваться' }}
      </button>
    </div>

    <div>
      <span>Two way: from REST API (webhook)</span>
      <button (click)="onSubmit(2)" [disabled]="regForm.invalid || isSubmitting()">
        {{ isSubmitting() ? 'Отправка...' : 'Зарегистрироваться' }}
      </button>
    </div>

  </form>
</div>


<footer>
  <a routerLink="/">home</a>
</footer>
